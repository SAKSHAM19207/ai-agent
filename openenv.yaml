spec_version: 1
name: openenv-jaoe
description: AI job application environment
type: space
runtime: fastapi
entrypoint: app.py

tasks:
  - id: jcoe-easy-v0
    difficulty: easy
    count: 5
    module: server.jaoe_environment:JaoeEnvironment
    env:
      JAOE_TASK: jcoe-easy-v0
    grader:
      type: code
      module: graders.easy:grade

  - id: jcoe-medium-v0
    difficulty: medium
    count: 5
    module: server.jaoe_environment:JaoeEnvironment
    env:
      JAOE_TASK: jcoe-medium-v0
    grader:
      type: code
      module: graders.medium:grade

  - id: jcoe-hard-v0
    difficulty: hard
    count: 5
    module: server.jaoe_environment:JaoeEnvironment
    env:
      JAOE_TASK: jcoe-hard-v0
    grader:
      type: code
      module: graders.hard:grade
